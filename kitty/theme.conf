# vim:ft=kitty

## name:     Catppuccin-Mocha(customized)
## author:   Nashath Hasan
## license:  MIT
## theme:    Soothing pastel theme for the high-spirited!
## The theme is inspiration derived from dinkii and catpuccin-mocha with my blend to it.


# Font is maple mono ttf you can substitute ttf for italic too!
font_family Maple Mono TTF

# Make the cursor shape a beam
shell_integration no-cursor
cursor_shape beam

# Padding
window_padding_width 7
window_padding_height 10

# Scroll back up to 3000 lines.
scrollback_lines 3000

#Default font size.
font_size 14

enable_audio_bell no

#cursor motion
cursor_trail 400
cursor_trail_decay 0.1 0.4
cursor_trail_start_threshold 1

#make background transperant
background_opacity 0.7

#remove # make use of custom kitty background by adding file path
#background_image /home/nash/Pictures/Wallpapers/desktop_backgrounds.png

# The basic colors
background #141216
foreground #d9c8b5
selection_background #D89BA5
selection_foreground #141216

# Cursor colors
cursor                  #D89BA5
cursor_text_color       #1E1E2E

# URL underline color when hovering with mouse
url_color               #F5E0DC

# Kitty window border colors
active_border_color     #B4BEFE
inactive_border_color   #6C7086
bell_border_color       #F9E2AF

# OS Window titlebar colors
wayland_titlebar_color system
macos_titlebar_color system

# Tab bar colors
active_tab_foreground   #11111B
active_tab_background   #CBA6F7
inactive_tab_foreground #CDD6F4
inactive_tab_background #181825
tab_bar_background      #11111B

# Colors for marks (marked text in the terminal)
mark1_foreground #1E1E2E
mark1_background #B4BEFE
mark2_foreground #1E1E2E
mark2_background #CBA6F7
mark3_foreground #1E1E2E
mark3_background #74C7EC

# The 16 terminal colors

# black
color0 #45475A
color8 #585B70

# red
color1 #F38BA8
color9 #F38BA8

# green
color2  #A6E3A1
color10 #A6E3A1

# yellow
color3  #F9E2AF
color11 #F9E2AF

# blue
color4  #89B4FA
color12 #89B4FA

# magenta
color5  #F5C2E7
color13 #F5C2E7

# cyan
color6  #94E2D5
color14 #94E2D5

# white
color7  #BAC2DE
color15 #A6ADC8
